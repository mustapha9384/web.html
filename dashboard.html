<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مزيل الخلفية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --white: #ffffff;
    --accent: #6366f1;
    --accent2: #ec4899;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 20px 60px rgba(99,102,241,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width:500px; height:500px; background:#6366f1; top:-100px; right:-100px; }
  .blob2 { width:400px; height:400px; background:#ec4899; bottom:-100px; left:-100px; }

  /* Captcha Screen */
  #captchaScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 0;
  }

  .captcha-card {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    width: 90%;
    max-width: 380px;
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .captcha-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin: 0 auto 20px;
    box-shadow: 0 8px 25px rgba(99,102,241,0.35);
  }

  .captcha-card h1 {
    font-size: 22px; font-weight: 900; color: var(--text);
    margin-bottom: 6px;
  }

  .captcha-card p {
    font-size: 13px; color: var(--muted);
    margin-bottom: 28px; line-height: 1.6;
  }

  /* Captcha Box */
  .captcha-box {
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 20px;
    background: #fafafa;
    user-select: none;
  }

  .captcha-box:hover { border-color: var(--accent); background: #f5f3ff; }
  .captcha-box.checking { border-color: var(--accent); background: #f5f3ff; }
  .captcha-box.done { border-color: #10b981; background: #f0fdf4; }

  .captcha-checkbox {
    width: 28px; height: 28px;
    border: 2px solid #d1d5db;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .captcha-box.checking .captcha-checkbox {
    border-color: var(--accent);
  }

  .captcha-box.done .captcha-checkbox {
    background: #10b981;
    border-color: #10b981;
  }

  .captcha-box.done .captcha-checkbox::after {
    content: '✓';
    color: white;
    font-size: 16px;
    font-weight: 900;
  }

  /* Spinner inside checkbox */
  .cb-spinner {
    width: 16px; height: 16px;
    border: 2px solid #e5e7eb;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .captcha-box.checking .cb-spinner { display: block; }
  .captcha-box.done .cb-spinner { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .captcha-label {
    font-size: 15px; font-weight: 600; color: var(--text); flex: 1; text-align: right;
  }

  .captcha-brand {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .btn-enter {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    display: none;
    transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  }

  .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(99,102,241,0.5); }
  .btn-enter.visible { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* ━━━ Main App ━━━ */
  #mainApp {
    display: none;
    width: 100%;
    max-width: 800px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }

  .app-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .app-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin: 0 auto 16px;
    box-shadow: 0 12px 35px rgba(99,102,241,0.35);
  }

  .app-header h1 { font-size: 32px; font-weight: 900; color: var(--text); }
  .app-header p { font-size: 15px; color: var(--muted); margin-top: 6px; }

  /* Upload Area */
  .upload-area {
    background: white;
    border: 2.5px dashed #c7d2fe;
    border-radius: 24px;
    padding: 50px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    margin-bottom: 24px;
  }

  .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: #f5f3ff; }

  .upload-icon { font-size: 52px; margin-bottom: 14px; }
  .upload-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--muted); }

  .upload-btn {
    display: inline-block;
    margin-top: 18px;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(99,102,241,0.35);
    transition: all 0.2s;
  }

  .upload-btn:hover { transform: translateY(-2px); }

  input[type=file] { display: none; }

  /* Processing */
  .processing {
    display: none;
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .process-spinner {
    width: 60px; height: 60px;
    border: 4px solid #e5e7eb;
    border-top-color: var(--accent);
    border-right-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  .process-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .process-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* Progress bar */
  .progress-wrap {
    width: 100%; background: #e5e7eb; border-radius: 10px;
    height: 8px; margin-top: 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Result */
  .result-area {
    display: none;
    background: white;
    border-radius: 24px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .result-title {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }

  .compare-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .img-box { border-radius: 14px; overflow: hidden; position: relative; }
  .img-box label {
    display: block;
    font-size: 12px; font-weight: 700; color: var(--muted);
    margin-bottom: 8px; text-align: center;
  }

  .img-box img {
    width: 100%; border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
  }

  /* Checkerboard for transparent */
  .transparent-bg {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .result-actions { display: flex; gap: 12px; flex-wrap: wrap; }

  .btn-download {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(99,102,241,0.35);
    transition: all 0.2s;
  }

  .btn-download:hover { transform: translateY(-2px); }

  .btn-again {
    padding: 14px 24px;
    background: white;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-again:hover { background: #f5f3ff; }

  @media(max-width:600px) {
    .compare-wrap { grid-template-columns: 1fr; }
    .app-header h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div id="captchaScreen">
  <div class="captcha-card">
    <div class="captcha-logo">✂️</div>
    <h1>مزيل الخلفية</h1>
    <p>تحقق من أنك لست روبوتاً للمتابعة</p>

    <div class="captcha-box" id="captchaBox" onclick="startCaptcha()">
      <div class="captcha-checkbox" id="captchaCheck">
        <div class="cb-spinner"></div>
      </div>
      <div class="captcha-label">لست روبوتاً</div>
      <span style="font-size:22px">🛡️</span>
    </div>

    <div class="captcha-brand">
      <span>🔒</span>
      <span>محمي بواسطة Secure Check</span>
    </div>

    <button class="btn-enter" id="enterBtn" onclick="enterApp()">
      ادخل الموقع ←
    </button>
  </div>
</div>

<div id="mainApp">
  <div class="app-header">
    <div class="app-logo">✂️</div>
    <h1>مزيل الخلفية</h1>
    <p>احذف خلفية أي صورة في ثوانٍ — مجاناً</p>
  </div>

  <div class="upload-area" id="uploadArea"
    ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
    onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">🖼️</div>
    <div class="upload-title">اسحب الصورة هنا أو اضغط لاختيارها</div>
    <div class="upload-sub">PNG, JPG, WEBP — حجم أقصى 10MB</div>
    <div class="upload-btn">اختر صورة</div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
  </div>

  <div class="processing" id="processing">
    <div class="process-spinner"></div>
    <div class="process-title">جاري إزالة الخلفية... ✨</div>
    <div class="process-sub">هذا يستغرق بضع ثوانٍ</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-title">✅ تمت إزالة الخلفية!</div>
    <div class="compare-wrap">
      <div class="img-box">
        <label>الصورة الأصلية</label>
        <img id="originalImg" src="" alt="original">
      </div>
      <div class="img-box transparent-bg">
        <label>بدون خلفية</label>
        <img id="resultImg" src="" alt="result">
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-download" onclick="downloadResult()">⬇️ تحميل PNG</button>
      <button class="btn-again" onclick="resetApp()">🔄 صورة جديدة</button>
    </div>
  </div>
</div>

<script>
// ━━━ Captcha Logic ━━━
let captchaDone = false;

function startCaptcha() {
  if (captchaDone) return;
  const box = document.getElementById('captchaBox');
  box.classList.add('checking');
  setTimeout(() => {
    box.classList.remove('checking');
    box.classList.add('done');
    captchaDone = true;
    document.getElementById('enterBtn').classList.add('visible');
  }, 1800);
}

function enterApp() {
  if (!captchaDone) return;
  document.getElementById('captchaScreen').style.animation = 'fadeOut 0.4s ease forwards';
  setTimeout(() => {
    document.getElementById('captchaScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
  }, 400);
}

// ━━━ Upload Logic ━━━
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('drag');
}

function handleDragLeave() {
  document.getElementById('uploadArea').classList.remove('drag');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

let resultBlob = null;

// تم دمج الـ API Key الخاص بك هنا مباشرة
const apiKey = "mBgPUXxyaB9aSA1fXokUe1cc";

function handleFile(file) {
  if (!file) return;

  // Show original preview
  const reader = new FileReader();
  reader.onload = e => document.getElementById('originalImg').src = e.target.result;
  reader.readAsDataURL(file);

  // Show processing
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('processing').style.display = 'block';
  document.getElementById('resultArea').style.display = 'none';

  // Animate progress
  let progress = 0;
  const progressFill = document.getElementById('progressFill');
  const interval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 12, 85);
    progressFill.style.width = progress + '%';
  }, 300);

  // Call remove.bg API
  const formData = new FormData();
  formData.append('image_file', file);
  formData.append('size', 'auto');

  fetch('https://api.remove.bg/v1.0/removebg', {
    method: 'POST',
    headers: { 'X-Api-Key': apiKey },
    body: formData
  })
  .then(res => {
    if (!res.ok) throw new Error(res.status);
    return res.blob();
  })
  .then(blob => {
    clearInterval(interval);
    progressFill.style.width = '100%';
    resultBlob = blob;
    const url = URL.createObjectURL(blob);
    document.getElementById('resultImg').src = url;
    setTimeout(() => {
      document.getElementById('processing').style.display = 'none';
      document.getElementById('resultArea').style.display = 'block';
    }, 400);
  })
  .catch(err => {
    clearInterval(interval);
    document.getElementById('processing').style.display = 'none';
    document.getElementById('uploadArea').style.display = 'block';
    if (err.message === '402') {
      alert('❌ انتهى رصيد الـ API — اشترِ رصيداً من remove.bg');
    } else if (err.message === '403') {
      alert('❌ API Key غير صحيح أو تم إلغاؤه');
    } else {
      alert('❌ حدث خطأ: ' + err.message);
    }
  });
}

function downloadResult() {
  if (!resultBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = 'removed_bg.png';
  a.click();
}

function resetApp() {
  resultBlob = null;
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('fileInput').value = '';
  document.getElementById('progressFill').style.width = '0%';
}

// Captcha fadeout animation
const style = document.createElement('style');
style.textContent = '@keyframes fadeOut{to{opacity:0;transform:scale(0.97)}}';
document.head.appendChild(style);
</script>
</body>
</html>
